name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
        working-directory: frontend

      - run: npm audit --audit-level=high
        working-directory: frontend

      - run: npm test
        working-directory: frontend

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - run: pip install -r requirements-dev.txt pip-audit
        working-directory: backend

      - run: pip-audit -r requirements.txt
        working-directory: backend

      - run: pytest
        working-directory: backend

  test-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck ./...
        working-directory: gateway

      - run: go test ./...
        working-directory: gateway

  test-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backtest/go.mod
          cache-dependency-path: backtest/go.sum

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - run: govulncheck ./...
        working-directory: backtest

      - run: go test ./...
        working-directory: backtest
