<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f1117"/>

  <!-- Chart line going up -->
  <polyline
    points="5,56 13,47 19,51 27,39 33,43 40,22"
    fill="none"
    stroke="#38bdf8"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Rocket pointing northeast (rotate 45° clockwise so nose aims upper-right) -->
  <g transform="translate(47,15) rotate(45)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="4" ry="6.5" fill="#e2e8f0"/>
    <!-- Nose cone -->
    <polygon points="0,-10.5 -4,-4 4,-4" fill="#f1f5f9"/>
    <!-- Left fin -->
    <polygon points="-4,4.5 -7.5,10 -4,8" fill="#94a3b8"/>
    <!-- Right fin -->
    <polygon points="4,4.5 7.5,10 4,8" fill="#94a3b8"/>
    <!-- Window -->
    <circle cx="0" cy="-1" r="1.8" fill="#38bdf8" opacity="0.85"/>
    <!-- Flame outer -->
    <ellipse cx="0" cy="9.5" rx="2.5" ry="3.8" fill="#f97316"/>
    <!-- Flame inner -->
    <ellipse cx="0" cy="8.5" rx="1.4" ry="2.2" fill="#fde68a"/>
  </g>
</svg>
