server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SSE endpoint — disable buffering so tokens reach the browser immediately
    location = /api/chat {
        proxy_pass http://gateway:8080/api/chat;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 60s;
        add_header X-Accel-Buffering no;
    }

    # Proxy API calls through the Go gateway (quota tracking + caching)
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
