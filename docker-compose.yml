services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CORS_ORIGINS=http://localhost:5173,http://localhost:5174
    expose:
      - "8000"
    networks:
      - backend_net
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backtest:
    build: ./backtest
    expose:
      - "8090"
    env_file: ./backend/.env
    networks:
      - backend_net
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  gateway:
    build: ./gateway
    expose:
      - "8080"
    env_file: ./backend/.env
    environment:
      - FASTAPI_URL=http://backend:8000
      - BACKTEST_URL=http://backtest:8090
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - frontend_net
      - backend_net
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      backtest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - frontend_net
    depends_on:
      gateway:
        condition: service_healthy

networks:
  frontend_net:
  backend_net:
